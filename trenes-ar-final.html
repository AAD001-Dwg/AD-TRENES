<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
  <meta name="theme-color" content="#0a0f1e"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta name="apple-mobile-web-app-title" content="Trenes AR"/>
  <title>Trenes AR</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#f0f2f7;--card:#fff;--header:#0a0f1e;--text:#0f172a;--muted:#64748b;
  --border:#e2e8f0;--radius:16px;
  --safe-top:env(safe-area-inset-top,0px);--safe-bottom:env(safe-area-inset-bottom,0px);
}
body{font-family:'DM Sans',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100dvh;overscroll-behavior:none}
.header{background:var(--header);padding:calc(var(--safe-top) + 14px) 20px 0;position:sticky;top:0;z-index:50}
.header-top{display:flex;align-items:center;justify-content:space-between;padding-bottom:10px}
.app-title{color:#fff;font-size:22px;font-weight:800;letter-spacing:-.5px}
.app-sub{color:#475569;font-size:11px;margin-top:1px;font-family:'DM Mono',monospace}
.status-pill{display:flex;align-items:center;gap:6px;padding:6px 12px;border-radius:20px;font-size:12px;font-weight:700;color:#fff;background:#1e293b;border:1px solid #334155;cursor:pointer}
.dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.lineas-scroll{display:flex;gap:8px;overflow-x:auto;padding-bottom:14px;scrollbar-width:none}
.lineas-scroll::-webkit-scrollbar{display:none}
.linea-btn{padding:7px 16px;border-radius:20px;border:2px solid transparent;font-size:12px;font-weight:700;color:#fff;cursor:pointer;white-space:nowrap;flex-shrink:0;background:#1e293b;transition:transform .1s}
.linea-btn:active{transform:scale(.95)}
/* ── FAVORITOS ROW ── */
.favs-row{display:flex;gap:8px;overflow-x:auto;padding:0 0 12px;scrollbar-width:none}
.favs-row::-webkit-scrollbar{display:none}
.fav-chip{display:flex;align-items:center;gap:6px;padding:6px 12px;border-radius:20px;font-size:12px;font-weight:700;background:#1e293b;border:1px solid #334155;color:#fff;cursor:pointer;white-space:nowrap;flex-shrink:0;transition:transform .1s}
.fav-chip:active{transform:scale(.95)}
.fav-chip-dot{width:7px;height:7px;border-radius:50%}
.fav-empty{font-size:11px;color:#475569;padding:4px 0 12px;font-family:'DM Mono',monospace}
.content{padding:16px 16px calc(var(--safe-bottom) + 80px);max-width:500px;margin:0 auto}
.estacion-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:14px 16px;display:flex;align-items:center;gap:12px;margin-bottom:14px}
.estacion-label{font-size:10px;color:var(--muted);font-weight:700;letter-spacing:.08em}
.estacion-select{font-size:17px;font-weight:700;color:var(--text);border:none;background:transparent;outline:none;cursor:pointer;width:100%;margin-top:2px;font-family:'DM Sans',sans-serif}
.linea-dot{width:12px;height:12px;border-radius:50%;flex-shrink:0}
/* star fav button */
.fav-star-btn{background:none;border:none;cursor:pointer;font-size:22px;padding:2px;line-height:1;flex-shrink:0}
.banner{border-radius:12px;padding:12px 14px;margin-bottom:14px;font-size:13px;line-height:1.5}
.banner-warn{background:#fefce8;border:1px solid #fde047;color:#713f12}
.banner-ok{background:#f0fdf4;border:1px solid #86efac;color:#14532d}
.banner strong{font-weight:700;display:block;margin-bottom:3px}
.section-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:18px 16px;margin-bottom:14px}
.section-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.section-title{font-size:13px;font-weight:700;color:var(--muted);letter-spacing:.05em;text-transform:uppercase}
.live-badge{display:flex;align-items:center;gap:5px;font-size:11px;font-weight:700;font-family:'DM Mono',monospace}
.live-dot{width:6px;height:6px;border-radius:50%}
.tren-card{border-radius:12px;padding:14px;border:1px solid var(--border);margin-bottom:10px;background:#fff}
.tren-card.proximo{background:#f0fdf4;border-color:#86efac}
.tren-card-row{display:flex;align-items:center;justify-content:space-between;gap:10px}
.tren-dest{font-size:14px;font-weight:700}
.tren-sub{font-size:12px;color:var(--muted);margin-top:2px}
.tren-min{font-size:26px;font-weight:800;font-family:'DM Mono',monospace;text-align:right}
.tren-min.demorado{color:#dc2626}
/* ── SHARE BUTTON ── */
.share-row{display:flex;justify-content:flex-end;margin-top:10px;padding-top:10px;border-top:1px solid var(--border)}
.share-btn{display:flex;align-items:center;gap:6px;padding:7px 14px;border-radius:20px;border:none;background:#25D366;color:#fff;font-size:12px;font-weight:700;cursor:pointer;font-family:'DM Sans',sans-serif}
.share-btn:active{opacity:.85}
.badge{display:inline-block;padding:3px 8px;border-radius:6px;font-size:11px;font-weight:700;white-space:nowrap}
.refresh-btn{background:none;border:none;cursor:pointer;font-size:18px;color:var(--muted);padding:4px}
@keyframes spin{to{transform:rotate(360deg)}}
.spinning{animation:spin .6s linear infinite}
.alerta-card{border-radius:12px;padding:14px;margin-bottom:10px}
.alerta-title{font-size:14px;font-weight:700}
.alerta-desc{font-size:12px;color:var(--muted);margin-top:5px;line-height:1.5}
.alerta-meta{font-size:11px;color:#94a3b8;margin-top:8px}
.horario-row{display:grid;grid-template-columns:70px 1fr 90px 70px;padding:12px 2px;border-bottom:1px solid var(--border);align-items:center}
.horario-row:last-child{border-bottom:none}
.horario-hora{font-size:16px;font-weight:700;font-family:'DM Mono',monospace}
/* ── MULTIRAMAL ── */
.multi-linea-block{margin-bottom:20px}
.multi-linea-header{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.multi-linea-pill{display:flex;align-items:center;gap:6px;padding:5px 12px;border-radius:20px;font-size:12px;font-weight:700;color:#fff}
.multi-estacion-select{font-size:13px;font-weight:600;border:1px solid var(--border);border-radius:8px;padding:5px 8px;background:#f8fafc;outline:none;color:var(--text);font-family:'DM Sans',sans-serif;flex:1}
.multi-tren-mini{display:flex;align-items:center;justify-content:space-between;padding:10px 12px;border-radius:10px;border:1px solid var(--border);background:#fff;margin-bottom:8px}
.multi-tren-mini.proximo{background:#f0fdf4;border-color:#86efac}
.multi-min{font-size:22px;font-weight:800;font-family:'DM Mono',monospace}
.multi-share-btn{background:none;border:none;cursor:pointer;font-size:18px;padding:2px;flex-shrink:0}
.bottom-nav{position:fixed;bottom:0;left:0;right:0;background:var(--header);padding:10px 0 calc(var(--safe-bottom) + 10px);display:flex;border-top:1px solid #1e293b;z-index:50}
.nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;background:none;border:none;cursor:pointer;padding:6px 4px;position:relative}
.nav-btn .nav-icon{font-size:20px}
.nav-btn .nav-label{font-size:10px;font-weight:700;color:#475569;font-family:'DM Sans',sans-serif;letter-spacing:.03em}
.nav-btn.active .nav-label{color:#fff}
.notif-badge{position:absolute;top:2px;right:calc(50% - 18px);background:#ef4444;color:#fff;width:16px;height:16px;border-radius:50%;font-size:10px;font-weight:800;display:flex;align-items:center;justify-content:center}
.spinner-wrap{text-align:center;padding:48px 0}
.spinner-icon{font-size:32px;display:inline-block;animation:spin 1s linear infinite}
.spinner-text{font-size:13px;color:var(--muted);margin-top:10px}
.filtros{display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap}
.filtro-btn{padding:7px 16px;border-radius:20px;font-size:13px;font-weight:700;border:1px solid var(--border);background:var(--card);color:var(--muted);cursor:pointer}
.filtro-btn.active{background:var(--text);color:#fff;border-color:var(--text)}
.mapa-wrap{background:#f8fafc;border-radius:12px;border:1px solid var(--border);overflow:hidden;padding:16px 8px}
.mapa-stats{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:14px}
.stat-box{background:#f9fafb;border:1px solid var(--border);border-radius:10px;padding:12px}
.stat-label{font-size:11px;color:var(--muted);font-weight:600}
.stat-value{font-size:20px;font-weight:800;margin-top:3px}
/* NOTIF */
.notif-perm-banner{border-radius:12px;padding:14px;background:#eff6ff;border:1px solid #bfdbfe;margin-bottom:14px}
.notif-perm-title{font-size:14px;font-weight:700;color:#1e40af;margin-bottom:6px}
.notif-perm-sub{font-size:12px;color:#3b82f6;line-height:1.5;margin-bottom:12px}
.btn-notif-perm{width:100%;padding:12px;border-radius:10px;border:none;background:#2563eb;color:#fff;font-size:14px;font-weight:700;cursor:pointer;font-family:'DM Sans',sans-serif}
.add-alerta-card{background:var(--card);border:2px dashed var(--border);border-radius:var(--radius);padding:20px;margin-bottom:14px;text-align:center;cursor:pointer}
.add-alerta-card:active{background:#f8fafc}
.add-icon{font-size:28px;margin-bottom:6px}
.add-label{font-size:14px;font-weight:700;color:var(--muted)}
.suscripcion-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:16px;margin-bottom:12px}
.sus-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px}
.sus-linea{display:flex;align-items:center;gap:8px}
.sus-linea-dot{width:10px;height:10px;border-radius:50%}
.sus-nombre{font-size:15px;font-weight:800}
.sus-estacion{font-size:13px;color:var(--muted);margin-top:1px}
.sus-delete{background:none;border:none;font-size:18px;color:#94a3b8;cursor:pointer;padding:4px;line-height:1}
.sus-pills{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px}
.sus-pill{padding:4px 10px;border-radius:20px;font-size:11px;font-weight:700}
.sus-toggle{display:flex;align-items:center;gap:8px;margin-top:12px;padding-top:12px;border-top:1px solid var(--border)}
.toggle-label{font-size:13px;color:var(--muted);flex:1}
.toggle-switch{position:relative;width:44px;height:26px;flex-shrink:0}
.toggle-switch input{opacity:0;width:0;height:0;position:absolute}
.toggle-slider{position:absolute;inset:0;background:#cbd5e1;border-radius:13px;cursor:pointer;transition:.2s}
.toggle-slider:before{content:'';position:absolute;width:20px;height:20px;left:3px;top:3px;background:#fff;border-radius:50%;transition:.2s;box-shadow:0 1px 3px rgba(0,0,0,.2)}
input:checked+.toggle-slider{background:#22c55e}
input:checked+.toggle-slider:before{transform:translateX(18px)}
.notif-log-item{display:flex;gap:10px;align-items:flex-start;padding:10px 0;border-bottom:1px solid var(--border)}
.notif-log-item:last-child{border-bottom:none}
.notif-log-icon{font-size:18px;flex-shrink:0}
.notif-log-text{font-size:13px;color:var(--text);line-height:1.4}
.notif-log-time{font-size:11px;color:var(--muted);margin-top:2px;font-family:'DM Mono',monospace}
/* MODALES */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:200;display:flex;align-items:flex-end}
.modal-sheet{background:var(--card);width:100%;border-radius:20px 20px 0 0;padding:24px 20px calc(var(--safe-bottom) + 24px);animation:slideUp .25s ease;max-height:90dvh;overflow-y:auto}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.modal-handle{width:40px;height:4px;background:#e2e8f0;border-radius:2px;margin:0 auto 20px}
.modal-title{font-size:18px;font-weight:800;margin-bottom:16px}
.modal-sub{font-size:13px;color:var(--muted);margin-bottom:20px;line-height:1.5}
.input-group{margin-bottom:16px}
.input-label{font-size:12px;font-weight:700;color:var(--muted);letter-spacing:.05em;text-transform:uppercase;margin-bottom:6px;display:block}
.input-field{width:100%;padding:13px 14px;border-radius:10px;border:1.5px solid var(--border);font-size:15px;font-family:'DM Sans',sans-serif;outline:none;background:#f8fafc}
.input-field:focus{border-color:#3b82f6;background:#fff}
.time-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.btn-primary{width:100%;padding:15px;border-radius:12px;border:none;background:var(--text);color:#fff;font-size:16px;font-weight:700;cursor:pointer;font-family:'DM Sans',sans-serif;margin-top:4px}
.btn-primary:disabled{background:#e2e8f0;color:#94a3b8;cursor:not-allowed}
.btn-secondary{width:100%;padding:13px;border-radius:12px;border:1.5px solid var(--border);background:transparent;color:var(--text);font-size:15px;font-weight:700;cursor:pointer;font-family:'DM Sans',sans-serif;margin-top:8px}
.warn-box{background:#fffbeb;border:1px solid #fde68a;border-radius:10px;padding:12px;font-size:12px;color:#92400e;margin-bottom:16px;line-height:1.5}
.linea-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:6px}
.linea-option{padding:10px 12px;border-radius:10px;border:2px solid var(--border);font-size:13px;font-weight:700;cursor:pointer;text-align:center;background:#fff;transition:.15s}
/* TOAST */
.toast{position:fixed;bottom:calc(var(--safe-bottom) + 90px);left:50%;transform:translateX(-50%);background:#0f172a;color:#fff;padding:10px 20px;border-radius:20px;font-size:13px;font-weight:600;z-index:300;opacity:0;transition:opacity .3s;pointer-events:none;white-space:nowrap}
.toast.show{opacity:1}
</style>
</head>
<body>

<!-- HEADER -->
<div class="header">
  <div class="header-top">
    <div>
      <div class="app-title">🚆 Trenes AR</div>
      <div class="app-sub">Red Ferroviaria Metropolitana</div>
    </div>
    <button class="status-pill" id="statusBtn" onclick="openConfigModal()">
      <span class="dot" id="statusDot" style="background:#475569"></span>
      <span id="statusLabel">Configurar</span>
    </button>
  </div>
  <!-- Líneas -->
  <div class="lineas-scroll" id="lineasScroll"></div>
  <!-- ⭐ Favoritos -->
  <div id="favsRow"></div>
</div>

<!-- CONTENT -->
<div class="content" id="mainContent">
  <div class="estacion-card">
    <span style="font-size:18px">📍</span>
    <div style="flex:1">
      <div class="estacion-label">ESTACIÓN</div>
      <select class="estacion-select" id="estacionSelect" onchange="onEstacionChange()"></select>
    </div>
    <button class="fav-star-btn" id="favStarBtn" onclick="toggleFavorito()" title="Agregar a favoritos">☆</button>
    <div class="linea-dot" id="lineaDot"></div>
  </div>
  <div id="bannerZone"></div>
  <div id="tabContent"></div>
</div>

<!-- BOTTOM NAV -->
<nav class="bottom-nav">
  <button class="nav-btn active" id="nav-proximos" onclick="setTab('proximos')">
    <span class="nav-icon">🕐</span><span class="nav-label">Próximos</span>
  </button>
  <button class="nav-btn" id="nav-multi" onclick="setTab('multi')">
    <span class="nav-icon">👥</span><span class="nav-label">Multiramal</span>
  </button>
  <button class="nav-btn" id="nav-alertas" onclick="setTab('alertas')" style="position:relative">
    <span class="nav-icon">⚠️</span><span class="nav-label">Alertas</span>
    <span class="notif-badge" id="alertCount" style="display:none">2</span>
  </button>
  <button class="nav-btn" id="nav-horarios" onclick="setTab('horarios')">
    <span class="nav-icon">📋</span><span class="nav-label">Horarios</span>
  </button>
  <button class="nav-btn" id="nav-notif" onclick="setTab('notif')" style="position:relative">
    <span class="nav-icon">🔔</span><span class="nav-label">Avisos</span>
    <span class="notif-badge" id="notifBadge" style="display:none">0</span>
  </button>
</nav>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<!-- MODAL CONFIGURACIÓN -->
<div class="modal-overlay" id="configModal" style="display:none" onclick="closeModalIf(event,'configModal')">
  <div class="modal-sheet">
    <div class="modal-handle"></div>
    <div class="modal-title">⚙️ Configuración</div>
    <div class="input-group">
      <label class="input-label">URL del servidor proxy</label>
      <input class="input-field" id="cfgProxyUrl" type="url" placeholder="https://ad-trenes.onrender.com" autocomplete="off"/>
      <div style="font-size:11px;color:var(--muted);margin-top:6px">Tu URL de Render. Dejá vacío para llamar directo (CORS).</div>
    </div>
    <div class="input-group">
      <label class="input-label">Client ID <span style="color:#94a3b8">(sin proxy)</span></label>
      <input class="input-field" id="cfgClientId" type="text" placeholder="tu_client_id" autocomplete="off" autocapitalize="none"/>
    </div>
    <div class="input-group">
      <label class="input-label">Client Secret <span style="color:#94a3b8">(sin proxy)</span></label>
      <input class="input-field" id="cfgClientSecret" type="password" placeholder="tu_client_secret" autocomplete="off"/>
    </div>
    <div class="warn-box">🔒 Con el proxy las credenciales viven en el servidor, más seguro.</div>
    <button class="btn-primary" onclick="saveConfig()">Guardar y conectar</button>
    <button class="btn-secondary" onclick="closeModal('configModal')">Cancelar</button>
  </div>
</div>

<!-- MODAL NUEVA SUSCRIPCIÓN -->
<div class="modal-overlay" id="susModal" style="display:none" onclick="closeModalIf(event,'susModal')">
  <div class="modal-sheet">
    <div class="modal-handle"></div>
    <div class="modal-title">🔔 Nueva alerta de tren</div>
    <div class="input-group">
      <label class="input-label">Línea</label>
      <div class="linea-grid" id="susLineaGrid"></div>
    </div>
    <div class="input-group">
      <label class="input-label">Estación</label>
      <select class="input-field" id="susEstacion" style="cursor:pointer"></select>
    </div>
    <div class="input-group">
      <label class="input-label">Franja horaria</label>
      <div class="time-row">
        <div><label class="input-label" style="font-size:10px">Desde</label><input class="input-field" id="susDesde" type="time" value="07:00"/></div>
        <div><label class="input-label" style="font-size:10px">Hasta</label><input class="input-field" id="susHasta" type="time" value="10:00"/></div>
      </div>
    </div>
    <div class="input-group">
      <label class="input-label">Notificar cuando el tren esté a</label>
      <div style="display:flex;gap:8px">
        <label style="flex:1;display:flex;align-items:center;gap:8px;padding:12px;border:1.5px solid var(--border);border-radius:10px;cursor:pointer;font-size:13px;font-weight:600">
          <input type="checkbox" id="chk20" checked style="width:16px;height:16px;accent-color:#0f172a"/> 20 minutos
        </label>
        <label style="flex:1;display:flex;align-items:center;gap:8px;padding:12px;border:1.5px solid var(--border);border-radius:10px;cursor:pointer;font-size:13px;font-weight:600">
          <input type="checkbox" id="chk10" checked style="width:16px;height:16px;accent-color:#0f172a"/> 10 minutos
        </label>
      </div>
    </div>
    <button class="btn-primary" onclick="saveSuscripcion()">Guardar alerta</button>
    <button class="btn-secondary" onclick="closeModal('susModal')">Cancelar</button>
  </div>
</div>

<script>
// ══ DATA ══════════════════════════════════════════════════════════════════════
const LINEAS=[
  {id:"mitre",         nombre:"Mitre",        color:"#E63946"},
  {id:"sarmiento",     nombre:"Sarmiento",    color:"#F4A261"},
  {id:"roca",          nombre:"Roca",         color:"#2A9D8F"},
  {id:"san-martin",    nombre:"San Martín",   color:"#457B9D"},
  {id:"belgrano-norte",nombre:"Bel. Norte",   color:"#D4A017"},
  {id:"belgrano-sur",  nombre:"Bel. Sur",     color:"#8B5CF6"},
];
const ESTACIONES={
  mitre: [
    "Retiro","Palermo","Belgrano C","Núñez","Aristóbulo del Valle","Rivadavia",
    "Lisandro de la Torre","Martínez","Acassuso","San Isidro","Boulogne",
    "Benavídez","Tigre",
    // Ramal José León Suárez
    "Miguelete","Rodríguez Peña","José León Suárez",
    // Ramal Bartolomé Mitre
    "Bartolomé Mitre","Florida","Villa del Parque"
  ],
  sarmiento: [
    "Once","Caballito","Flores","Liniers","Ramos Mejía","Haedo",
    "El Palomar","Morón","Castelar","Ituzaingó","Merlo","Paso del Rey",
    "Padua","Moreno","Libertad","Mercedes","Luján",
    // Ramal Lobos
    "González Catán","Lomas del Mirador","La Tablada"
  ],
  roca: [
    // Ramal La Plata (del debug real)
    "Constitución","S y Kosteki","Sarandí","V. Domínico","Wilde",
    "Don Bosco","Bernal","Quilmes","Ezpeleta","Berazategui",
    "Plátanos","Hudson","Pereyra","V. Elisa","City Bell",
    "Gonnet","Ringuelet","Tolosa","La Plata",
    // Ramal Bosques / Temperley
    "Avellaneda","Lanús","Lomas de Zamora","Banfield","Temperley",
    "Longchamps","Alejandro Korn","Bosques","Florencio Varela",
    // Ramal Glew / Ezeiza

// ══ API ═══════════════════════════════════════════════════════════════════════
async function apiFetch(endpoint,params={}){
  const base=proxyUrl.replace(/\/$/,"");
  const p=new URLSearchParams(params);
  const url=base+"/api"+endpoint+"?"+p;
  const r=await fetch(url,{signal:AbortSignal.timeout(10000)});
  if(!r.ok) throw new Error(`HTTP ${r.status}`);
  return r.json();
}

async function testConexion(){
  updateStatusUI("checking");
  try{
    if(proxyUrl){const r=await fetch(proxyUrl.replace(/\/$/,"")+"/api/health",{signal:AbortSignal.timeout(5000)});const d=await r.json();apiStatus=d.status==="ok"?"ok":"error";}
    else{await apiFetch("/trenes/alerts");apiStatus="ok";}
  }catch(e){apiStatus=e instanceof TypeError?"cors":"error";}
  updateStatusUI();renderBanner();renderTab();
}

function updateStatusUI(s){
  const state=s||apiStatus;
  const map={null:["#475569","Configurar"],checking:["#f59e0b","Probando…"],ok:["#4ade80","En vivo"],cors:["#fb923c","CORS"],error:["#f87171","Error"]};
  const [c,t]=map[state]??map[null];
  document.getElementById("statusDot").style.background=c;
  document.getElementById("statusLabel").textContent=t;
}

function renderBanner(){
  const z=document.getElementById("bannerZone");

  else if(apiStatus==="cors") z.innerHTML=`<div class="banner banner-warn"><strong>⚠️ Bloqueado por CORS</strong>Configurá la URL del proxy. <a href="#" onclick="openConfigModal()" style="color:#92400e;font-weight:700">← Configurar</a></div>`;

}

function favKey(lineaId,estacion){return `${lineaId}::${estacion}`;}
function isFavorito(lineaId,estacion){return favoritos.some(f=>f.lineaId===lineaId&&f.estacion===estacion);}

function toggleFavorito(){
  const key=favKey(lineaActiva.id,estacionActiva);
  if(isFavorito(lineaActiva.id,estacionActiva)){
    favoritos=favoritos.filter(f=>!(f.lineaId===lineaActiva.id&&f.estacion===estacionActiva));
    showToast("⭐ Eliminado de favoritos");
  } else {
    favoritos.push({lineaId:lineaActiva.id,estacion:estacionActiva});
    showToast("⭐ Agregado a favoritos");
  }
  localStorage.setItem("favoritos",JSON.stringify(favoritos));
  updateFavStar();
  renderFavsRow();

function renderFavsRow(){

// ══ MOCK ══════════════════════════════════════════════════════════════════════
function genTrenes(linea,estacion){
  const now=new Date();
  return Array.from({length:3},(_,i)=>{
    const min=Math.floor(Math.random()*4)+i*7+1;
    const dem=Math.random()>.7?Math.floor(Math.random()*12)+1:0;
    const dest=(estacionesCache[linea.id]||[]).at(-1)||"Terminal";
    return{id:`T${Math.floor(Math.random()*9000)+1000}`,dest,min:min+dem,dem,
      hora:new Date(now.getTime()+(min+dem)*60000).toLocaleTimeString("es-AR",{hour:"2-digit",minute:"2-digit"}),
      cap:["Alta","Media","Baja"][Math.floor(Math.random()*3)],anden:(i%4)+1};
  });
}
function capBadge(n){const m={Alta:["#fee2e2","#991b1b"],Media:["#fef9c3","#854d0e"],Baja:["#dcfce7","#166534"]};const[bg,c]=m[n]||m.Media;return`<span class="badge" style="background:${bg};color:${c}">● ${n}</span>`;}

// ══ PRÓXIMOS ══════════════════════════════════════════════════════════════════
async function fetchTrenes(linea,estacion){
  try{
    if(apiStatus!=="ok") throw new Error("no_api");
    const data=await apiFetch("/trenes/llegadas",{estacion:estacion});
    const arr=data?.llegadas||[];
    const trenes=arr.slice(0,3).map((e,i)=>({
      id:e.tripId||`T${1000+i}`,
      dest:e.dest||(estacionesCache[linea.id]||[]).at(-1)||"Terminal",
      min:Math.max(1,e.minutos||1),
      dem:e.demora||0,
      hora:e.hora||"--:--",
      cap:e.cap||["Alta","Media","Baja"][i%3],
      anden:e.anden||(i%4)+1,
    }));
    if(trenes.length) return{trenes,mock:false};
  }catch(e){console.warn("fetchTrenes error:",e.message);}
  return{trenes:genTrenes(linea,estacion),mock:true};
}

function compartirTren(tren,linea,estacion){
  const hora=new Date().toLocaleTimeString("es-AR",{hour:"2-digit",minute:"2-digit"});
  const msg=`🚆 *Tren ${linea.nombre}*\n📍 Estación ${estacion}\n⏱ Llega en *${tren.min} minutos* (${tren.hora})\n${tren.dem>0?`⚠️ Demora de ${tren.dem} min\n`:''}_Compartido desde Trenes AR · ${hora}_`;
  const url=`https://wa.me/?text=${encodeURIComponent(msg)}`;
  window.open(url,"_blank");
}

async function renderMulti(z){

  const resultados=await Promise.all(lineasMostrar.map(async l=>{

    suscripciones.map((s,i)=>{const linea=LINEAS.find(l=>l.id===s.lineaId)||LINEAS[0];return`<div class="suscripcion-card"><div class="sus-header"><div class="sus-linea"><div class="sus-linea-dot" style="background:${linea.color}"></div><div><div class="sus-nombre">${linea.nombre} · ${s.estacion}</div><div class="sus-estacion">Franja ${s.desde} – ${s.hasta}</div></div></div><button class="sus-delete" onclick="deleteSus(${i})">✕</button></div><div class="sus-pills">${s.aviso20?`<span class="sus-pill" style="background:#dbeafe;color:#1d4ed8">⏰ 20 min</span>`:''} ${s.aviso10?`<span class="sus-pill" style="background:#dcfce7;color:#166534">⏰ 10 min</span>`:''}</div><div class="sus-toggle"><span class="toggle-label">${s.activa?'Activa':'Pausada'}</span><label class="toggle-switch"><input type="checkbox" ${s.activa?'checked':''} onchange="toggleSus(${i},this.checked)"><span class="toggle-slider"></span></label></div></div>`;}).join("");
  const logHtml=notifLog.length>0?`<div class="section-card"><div class="section-header"><span class="section-title">Historial</span><button onclick="clearLog()" style="font-size:12px;color:var(--muted);background:none;border:none;cursor:pointer">Limpiar</button></div>${notifLog.slice(0,10).map(n=>`<div class="notif-log-item"><span class="notif-log-icon">${n.min<=10?'🚨':'⚠️'}</span><div><div class="notif-log-text"><strong>${n.lineaNombre}</strong> en ${n.estacion} — a <strong>${n.min} min</strong></div><div class="notif-log-time">${n.hora}</div></div></div>`).join("")}</div>`:"";
  z.innerHTML=`${permBanner}<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px"><div style="font-size:16px;font-weight:800">Mis alertas <span style="font-size:13px;color:var(--muted);font-weight:500">(${suscripciones.filter(s=>s.activa).length} activas)</span></div></div>${susHtml}<div class="add-alerta-card" onclick="openSusModal()"><div class="add-icon">＋</div><div class="add-label">Agregar nueva alerta</div></div>${logHtml}<div class="section-card" style="margin-bottom:14px"><div class="section-header" style="margin-bottom:10px"><span class="section-title">🧪 Testear notificaciones</span></div><div style="font-size:13px;color:var(--muted);margin-bottom:12px;line-height:1.5">Enviá una notificación de prueba para verificar que aparece en la barra del sistema.</div><div style="display:flex;gap:8px"><button onclick="testNotificacion(20)" style="flex:1;padding:12px;border-radius:10px;border:1.5px solid #3b82f6;background:#eff6ff;color:#1d4ed8;font-size:13px;font-weight:700;cursor:pointer;font-family:'DM Sans',sans-serif">Simular 20 min ⏰</button><button onclick="testNotificacion(10)" style="flex:1;padding:12px;border-radius:10px;border:none;background:#0f172a;color:#fff;font-size:13px;font-weight:700;cursor:pointer;font-family:'DM Sans',sans-serif">Simular 10 min 🚨</button></div></div>`;
}

async function requestNotifPermission(){
  const p=await Notification.requestPermission();
  if(p==="granted") renderTab();
  else alert("Sin permiso de notificaciones la app no puede avisarte. Habilitalo en la configuración de tu celular.");
}
// Carga estaciones reales desde la API SOFSE para cada línea
const RAMAL_IDS = {
  // Mapa lineaId → ramales SOFSE conocidos
  // (id_ramal obtenidos de la API)
  roca: [11, 16, 26, 27, 28, 30, 31],  // Constitución-LP, Bosques, Temperley, etc
  mitre: [1, 2, 3, 4, 5],
  sarmiento: [6, 7, 8],
  "san-martin": [9, 10],
  "belgrano-norte": [17, 18],
  "belgrano-sur": [19, 20],
};

async function cargarEstacionesDinamicas() {
  // Para cada linea, buscar estaciones por nombre de terminales conocidas
  const busquedas = {
    roca: ["Constitución", "La Plata", "Bosques", "Temperley", "Hudson", "Quilmes"],
    mitre: ["Retiro", "Tigre", "José León Suárez", "Bartolomé Mitre"],
    sarmiento: ["Once", "Moreno", "Mercedes", "Luján"],
    "san-martin": ["Retiro", "Merlo", "General Rodríguez"],
    "belgrano-norte": ["F.C. Central", "José León Suárez", "Del Viso"],
    "belgrano-sur": ["Buenos Aires", "González Catán"],
  };
  try {
    for (const [lineaId, terminos] of Object.entries(busquedas)) {
      const encontradas = new Set();
      for (const termino of terminos.slice(0,2)) { // solo 2 búsquedas por línea
        try {
          const data = await apiFetch("/trenes/estaciones", {nombre: termino});
          const lista = Array.isArray(data) ? data : (data?.estaciones || []);
          lista.forEach(e => { if(e.nombre) encontradas.add(e.nombre); });
        } catch {}
      }
      if (encontradas.size > 3) {
        const sorted = [...encontradas].sort();
        estacionesCache[lineaId] = sorted;
        // Actualizar el selector si es la línea activa
        if (lineaId === lineaActiva.id) updateEstaciones();
      }
    }
    console.log('Estaciones dinámicas cargadas');
  } catch(e) {
    console.warn('No se pudieron cargar estaciones dinámicas:', e.message);
  }
}

function startPolling(){if(pollingTimer) clearInterval(pollingTimer);pollingTimer=setInterval(checkSuscripciones,60000);}
async function checkSuscripciones(){
  if(apiStatus!=="ok") return;
  const horaActual=new Date().toTimeString().slice(0,5);
  for(const sus of suscripciones){
    if(!sus.activa||horaActual<sus.desde||horaActual>sus.hasta) continue;
    try{
      const data=await apiFetch("/trenes/llegadas",{estacion:sus.estacion});
      const arr=data?.llegadas||[];
      const nowSec=Math.floor(Date.now()/1000);
      const linea=LINEAS.find(l=>l.id===sus.lineaId)||LINEAS[0];
      for(const e of arr.slice(0,5)){
        const min=e.minutos||0;
        const tripId=e.tripId||`${e.hora}`;
        if(sus.aviso20&&min>=18&&min<=22){const k=`${tripId}-20`;if(!notifSent.has(k)){notifSent.add(k);dispararNotificacion(linea,sus.estacion,min,k);}}
        if(sus.aviso10&&min>=8&&min<=12){const k=`${tripId}-10`;if(!notifSent.has(k)){notifSent.add(k);dispararNotificacion(linea,sus.estacion,min,k);}}
      }
    }catch(e){console.warn("polling error",e.message);}
  }
}
async function dispararNotificacion(linea,estacion,min,key){
  const hora=new Date().toLocaleTimeString("es-AR",{hour:"2-digit",minute:"2-digit"});
  notifLog.unshift({lineaNombre:linea.nombre,estacion,min,hora,key});
  if(notifLog.length>50) notifLog.pop();
  localStorage.setItem("notifLog",JSON.stringify(notifLog));
  updateNotifBadge();

  if(Notification.permission!=="granted") return;

  const titulo=`🚆 Tren ${linea.nombre} llegando`;
  const opts={
    body:`A ${min} minutos de ${estacion} · ${hora}`,
    tag:key,
    requireInteraction:min<=10,
    icon:'/icon.png',
    badge:'/icon.png',
    vibrate:min<=10?[200,100,200]:[100],
    data:{estacion,min,linea:linea.nombre},
  };

  try {
    // En Android Chrome SIEMPRE usar SW — new Notification() no muestra en la barra
    if(swReady){
      const reg = await swReady;
      await reg.showNotification(titulo, opts);
      console.log('Notificación enviada via SW ✅');
    } else {
      // Fallback para desktop/Safari
      new Notification(titulo, opts);
    }
  } catch(e) {
    console.warn('Error notificación:', e.message);
    try { new Notification(titulo, opts); } catch {}
  }

  if(navigator.vibrate) navigator.vibrate(min<=10?[200,100,200]:[100]);
}
function updateNotifBadge(){
  const b=document.getElementById("notifBadge");
  if(notifLog.length>0){b.style.display="flex";b.textContent=Math.min(notifLog.length,9);}
  else b.style.display="none";
}

// ══ SUSCRIPCIONES ═════════════════════════════════════════════════════════════
function openSusModal(){
  susLineaSeleccionada=LINEAS[2];
  renderSusLineaGrid();updateSusEstaciones();
  document.getElementById("susDesde").value="07:00";
  document.getElementById("susHasta").value="10:00";
  document.getElementById("chk20").checked=true;
  document.getElementById("chk10").checked=true;
  document.getElementById("susModal").style.display="flex";
}
function renderSusLineaGrid(){
  document.getElementById("susLineaGrid").innerHTML=LINEAS.map(l=>`<div class="linea-option${l.id===susLineaSeleccionada.id?' selected':''}" style="color:${l.color};border-color:${l.id===susLineaSeleccionada.id?l.color:'var(--border)'};background:${l.id===susLineaSeleccionada.id?l.color+'15':'#fff'}" onclick="selectSusLinea('${l.id}')"><div style="font-weight:800">${l.nombre}</div></div>`).join("");
}
function selectSusLinea(id){susLineaSeleccionada=LINEAS.find(l=>l.id===id);renderSusLineaGrid();updateSusEstaciones();}
function updateSusEstaciones(){
  document.getElementById("susEstacion").innerHTML=(estacionesCache[susLineaSeleccionada.id]||[]).map(e=>`<option value="${e}">${e}</option>`).join("");
}
function saveSuscripcion(){
  suscripciones.push({id:Date.now(),lineaId:susLineaSeleccionada.id,estacion:document.getElementById("susEstacion").value,desde:document.getElementById("susDesde").value,hasta:document.getElementById("susHasta").value,aviso20:document.getElementById("chk20").checked,aviso10:document.getElementById("chk10").checked,activa:true});
  localStorage.setItem("suscripciones",JSON.stringify(suscripciones));
  closeModal("susModal");requestNotifPermission();renderTab();
}
function deleteSus(i){suscripciones.splice(i,1);localStorage.setItem("suscripciones",JSON.stringify(suscripciones));renderTab();}
function toggleSus(i,v){suscripciones[i].activa=v;localStorage.setItem("suscripciones",JSON.stringify(suscripciones));renderTab();}
async function testNotificacion(min){
  if(Notification.permission!=="granted"){
    alert("Primero habilitá las notificaciones con el botón de arriba.");
    return;
  }
  const estacion = estacionActiva || "Hudson";
  const linea = lineaActiva;
  const hora = new Date().toLocaleTimeString("es-AR",{hour:"2-digit",minute:"2-digit"});
  const key = `test-${Date.now()}`;
  // Disparar notificación de prueba directamente
  const opts = {
    body:`A ${min} minutos de ${estacion} · ${hora} (PRUEBA)`,
    tag: key,
    requireInteraction: min <= 10,
    vibrate: min <= 10 ? [200,100,200] : [100],
  };
  try {
    if(swReady){ const reg=await swReady; await reg.showNotification(`🚆 Tren ${linea.nombre} llegando`,opts); }
    else new Notification(`🚆 Tren ${linea.nombre} llegando`,opts);
  } catch(e) { new Notification(`🚆 Tren ${linea.nombre} llegando`,opts); }
  if(navigator.vibrate) navigator.vibrate(min<=10?[200,100,200]:[100]);
  // Guardar en log
  notifLog.unshift({lineaNombre:linea.nombre,estacion,min,hora:`${hora} (PRUEBA)`,key});
  localStorage.setItem("notifLog",JSON.stringify(notifLog));
  updateNotifBadge();
  showToast("🧪 Notificación de prueba enviada");
  renderTab();
}

function clearLog(){notifLog=[];localStorage.setItem("notifLog",JSON.stringify(notifLog));updateNotifBadge();renderTab();}

function showToast(msg){
  const t=document.getElementById("toast");
  t.textContent=msg;t.classList.add("show");
  setTimeout(()=>t.classList.remove("show"),2200);
